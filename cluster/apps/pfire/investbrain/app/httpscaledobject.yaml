---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: investbrain
  namespace: pfire
spec:
  hosts:
    - investbrain.${SECRET_DOMAIN}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: investbrain
    kind: Deployment
    apiVersion: apps/v1
    service: investbrain
    port: 8000
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300
