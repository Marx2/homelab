---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - interceptor-service.yaml
  - httpscaledobject.yaml
configMapGenerator:
  - name: jobshot-jobs
    files:
      - jobs.yaml=./config/jobs.yaml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: enabled