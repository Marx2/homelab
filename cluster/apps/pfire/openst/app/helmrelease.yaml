---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openst
  namespace: pfire
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  driftDetection:
    mode: enabled
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      openst:
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/marx2/openst
              tag: v1.0.3
            env:
              TZ: "${TZ}"
              REDIS_HOST: localhost
              REDIS_PORT: "6379"
              REDIS_DB: "0"
            envFrom:
              - secretRef:
                  name: openst-secrets
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
          redis:
            image:
              repository: redis
              tag: 7-alpine
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8080
    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          hajimari.io/icon: mdi:finance
          hajimari.io/enable: "true"
          hajimari.io/info: OpenBB dividend data proxy.
        hosts:
          - host: &host "openst.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  name: openst
                  port: 8080
        tls:
          - hosts:
              - *host
