---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartctl-exporter-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  smartctl-exporter.json: |-
    {
      "title": "S.M.A.R.T. Disk Health",
      "uid": "smartctl-exporter",
      "timezone": "browser",
      "refresh": "5m",
      "time": { "from": "now-24h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "instance",
            "type": "query",
            "label": "Node",
            "datasource": "prometheus",
            "query": "label_values(smartctl_device_info, instance)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {}
          },
          {
            "name": "device",
            "type": "query",
            "label": "Device",
            "datasource": "prometheus",
            "query": "label_values(smartctl_device_info{instance=~\"$instance\"}, device)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "SMART Overall Health",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "smartctl_device_smart_status{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "PASSED", "color": "green" }, "0": { "text": "FAILED", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Temperature (°C)",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "smartctl_device_temperature{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 45 },
                  { "color": "red", "value": 60 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Power-On Hours",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "smartctl_device_power_on_seconds{instance=~\"$instance\",device=~\"$device\"} / 3600",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "h", "decimals": 0 } }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Power Cycle Count",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "smartctl_device_power_cycle_count{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Temperature Over Time",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "smartctl_device_temperature{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 45 },
                  { "color": "red", "value": 60 }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Read/Write Errors",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "smartctl_device_attribute{instance=~\"$instance\",device=~\"$device\",attribute_name=\"Reallocated_Sector_Ct\"}",
              "legendFormat": "Reallocated {{instance}} {{device}}"
            },
            {
              "expr": "smartctl_device_attribute{instance=~\"$instance\",device=~\"$device\",attribute_name=\"Offline_Uncorrectable\"}",
              "legendFormat": "Uncorrectable {{instance}} {{device}}"
            },
            {
              "expr": "smartctl_device_attribute{instance=~\"$instance\",device=~\"$device\",attribute_name=\"Current_Pending_Sector\"}",
              "legendFormat": "Pending {{instance}} {{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }]
              }
            }
          }
        },
        {
          "id": 7,
          "type": "table",
          "title": "Device Info",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 6 },
          "targets": [
            {
              "expr": "smartctl_device_info{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": {} },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Value": true, "__name__": true, "job": true } } }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "NVMe Media Errors",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "smartctl_device_nvme_log_health_info_media_errors_total{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "NVMe Available Spare (%)",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "smartctl_device_nvme_log_health_info_available_spare{instance=~\"$instance\",device=~\"$device\"}",
              "legendFormat": "{{instance}} {{device}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "green", "value": 25 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 38
    }
