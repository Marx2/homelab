---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app searxng
spec:
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /spec/containers/resources/limits
        target:
          kind: Pod
  values:
    global:
      createDefaultServiceAccount: false

    defaultPodOptions:
      securityContext:
        runAsUser: 977
        runAsGroup: 977
        runAsNonRoot: true
        fsGroup: 977
        seccompProfile:
          type: RuntimeDefault

    controllers:
      searxng:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/searxng/searxng
              tag: latest
            env:
              TZ: ${TZ}
              SEARXNG_BASE_URL: "https://searxng.${SECRET_DOMAIN}/"
              SEARXNG_SETTINGS_PATH: /config/settings.yml
            envFrom:
              - secretRef:
                  name: searxng-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080

    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          hajimari.io/appName: "SearXNG"
          hajimari.io/icon: mdi:magnify
          hajimari.io/enable: "true"
          hajimari.io/info: Privacy-respecting metasearch engine
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${SECRET_DOMAIN}/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      config-file:
        type: configMap
        name: searxng-config
        globalMounts:
          - path: /config/settings.yml
            subPath: settings.yml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      searxng-data:
        type: emptyDir
        globalMounts:
          - path: /etc/searxng
