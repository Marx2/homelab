# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pictshare
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
        target:
          kind: Deployment
      - paths: [/spec/containers/resources/limits]
        target:
          kind: Pod
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      pictshare:
        replicas: 0
        containers:
          app:
            image:
              repository: ghcr.io/hascheksolutions/pictshare
              tag: 19d7cb06
            env:
              TZ: ${TZ}
              MAX_RESIZED_IMAGES: "2"
              UPLOAD_FORM_LOCATION: /
              LOG_UPLOADER: "true"

    service:
      app:
        controller: pictshare
        ports:
          http:
            port: 80

    ingress:
      app:
        className: nginx
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: "cloud-sync-outline"
          hajimari.io/group: "networking"
        hosts:
          - host: &host pictshare.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  name: keda-http-interceptor-proxy
                  port: 8080
        tls:
          - hosts:
              - *host
