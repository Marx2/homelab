---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karpor
  namespace: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: karpor
      version: 0.7.6
      sourceRef:
        kind: HelmRepository
        name: kusionstack
        namespace: flux-system
  values:
    namespaceEnabled: false