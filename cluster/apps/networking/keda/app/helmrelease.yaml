---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: networking
spec:
  chart:
    spec:
      chart: keda
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
      version: 2.19.0
  install:
    crds: Create
    timeout: 7m
  interval: 1m0s
  timeout: 7m
  releaseName: keda
  targetNamespace: networking
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    prometheus:
      metricServer:
        enabled: true
        podMonitor:
          enabled: true
          namespace: networking
          namespaceSelector:
            matchNames:
              - networking
      operator:
        enabled: true
        podMonitor:
          enabled: true
          namespace: networking
          namespaceSelector:
            matchNames:
              - networking
      webhooks:
        enabled: true
        podMonitor:
          enabled: true
          namespace: networking
          namespaceSelector:
            matchNames:
              - networking