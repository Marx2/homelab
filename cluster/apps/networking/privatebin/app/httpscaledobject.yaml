apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: privatebin
  namespace: networking
spec:
  hosts:
    - privatebin.${SECRET_DOMAIN}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: privatebin
    kind: Deployment
    apiVersion: apps/v1
    service: app
    port: 8080
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300
