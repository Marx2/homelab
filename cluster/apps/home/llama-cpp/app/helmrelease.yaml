# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama-cpp
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/containers/resources/limits]
        target:
          kind: Pod
  values:
    controllers:
      llama-cpp:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
        initContainers:
          download-model:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-alpine
            command:
              - /bin/sh
              - -ec
              - |
                uv pip install --system --no-cache huggingface_hub
                python3 -c "
                from huggingface_hub import hf_hub_download
                import os, glob
                model_dir = '/models'
                repo = 'Qwen/Qwen2.5-7B-Instruct-GGUF'
                files = [
                  'qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf',
                  'qwen2.5-7b-instruct-q4_k_m-00002-of-00002.gguf',
                ]
                for old in glob.glob(os.path.join(model_dir, 'qwen2.5-14b*')):
                    print(f'Removing old: {old}')
                    os.remove(old)
                for f in files:
                    dest = os.path.join(model_dir, f)
                    if os.path.exists(dest):
                        print(f'Already exists: {f}')
                        continue
                    print(f'Downloading: {f}')
                    hf_hub_download(repo_id=repo, filename=f, local_dir=model_dir)
                    print(f'Done: {f}')
                "
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-vulkan
            env:
              TZ: ${TZ}
              LLAMA_ARG_HOST: "0.0.0.0"
              LLAMA_ARG_PORT: "8080"
              LLAMA_ARG_MODEL: /models/qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf
              LLAMA_ARG_CTX_SIZE: "4096"
              LLAMA_ARG_N_PREDICT: "2048"
              LLAMA_ARG_THREADS: "4"
              LLAMA_ARG_PARALLEL: "2"
              LLAMA_ARG_BATCH_SIZE: "512"
              LLAMA_ARG_UBATCH_SIZE: "256"
              LLAMA_ARG_N_GPU_LAYERS: "33"
              LLAMA_OFFLINE: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 100m
                memory: 6Gi
                gpu.intel.com/i915: 1
              limits:
                memory: 10Gi
                gpu.intel.com/i915: 1

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${SECRET_DOMAIN}/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
          hajimari.io/enable: "true"
          hajimari.io/appName: "llama.cpp"
          hajimari.io/icon: "mdi:brain"
          hajimari.io/info: Local LLM server
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      models:
        existingClaim: llama-cpp-models
        advancedMounts:
          llama-cpp:
            app:
              - path: /models
                readOnly: true
            download-model:
              - path: /models
                readOnly: false
