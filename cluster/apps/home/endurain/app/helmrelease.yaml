# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app endurain
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/containers/resources/limits]
        target:
          kind: Pod
  values:
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      endurain:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: codeberg.org/endurain-project/endurain
              tag: v0.19.0
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            env:
              TZ: ${TZ}
              DB_HOST: postgres-home-primary.home.svc.cluster.local
              DB_PORT: "5432"
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-home-pguser-endurain
                    key: user
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: postgres-home-pguser-endurain
                    key: password
              DB_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: postgres-home-pguser-endurain
                    key: dbname
              SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: endurain-secrets
                    key: SECRET_KEY
              FERNET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: endurain-secrets
                    key: FERNET_KEY
              RATE_LIMIT_ENABLED: "false"
              ENDURAIN_HOST: "https://endurain.${SECRET_DOMAIN}"
              BEHIND_PROXY: "true"
            ports:
              - name: http
                containerPort: &port 8080
                protocol: TCP

    service:
      app:
        controller: endurain
        ports:
          http:
            port: 80
            targetPort: *port

    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${SECRET_DOMAIN}/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
          hajimari.io/enable: "true"
          hajimari.io/appName: "Endurain"
          hajimari.io/icon: "mdi:run-fast"
          hajimari.io/info: Fitness tracker
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      data:
        existingClaim: endurain-data-pvc
        globalMounts:
          - path: /app/backend/data
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/backend/logs
