apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: firefox
  namespace: home
spec:
  hosts:
    - firefox.${SECRET_DOMAIN}
  pathPrefixes:
    - /
  scaleTargetRef:
    name: firefox
    kind: Deployment
    apiVersion: apps/v1
    service: app
    port: 5800
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300
