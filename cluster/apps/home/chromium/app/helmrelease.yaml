# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chromium
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
        target:
          kind: Deployment
      - paths: [/spec/containers/resources/limits]
        target:
          kind: Pod
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      chromium:
        replicas: 0
        containers:
          app:
            image:
              repository: docker.io/kasmweb/chromium
              tag: 1.19.0
            env:
              TZ: ${TZ}
              VNC_PW: "kasmweb"
              VNC_RESOLUTION: "1920x1080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 6901
                    scheme: HTTPS
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 6901
                    scheme: HTTPS
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 6901
                    scheme: HTTPS
                  failureThreshold: 30
                  periodSeconds: 5

    service:
      app:
        controller: chromium
        ports:
          http:
            port: 6901

    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${SECRET_DOMAIN}/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
          hajimari.io/enable: "true"
          hajimari.io/icon: "google-chrome"
          hajimari.io/info: Chromium browser with seamless clipboard
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  name: keda-http-interceptor-proxy
                  port: 8080
        tls:
          - hosts:
              - *host

    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /home/kasm-user
