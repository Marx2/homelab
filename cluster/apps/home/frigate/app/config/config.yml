---
logger:
  default: info
  # logs:
  #   frigate.record: debug

auth:
  enabled: false

tls:
  enabled: false

mqtt:
  host: emqx.home.svc.cluster.local
  topic_prefix: frigate
  user: "${EMQX_MQTT_USER}"
  password: "${EMQX_MQTT_PASSWORD}"

database:
  path: /data/frigate.db

detectors:
  coral:
    type: edgetpu
    device: usb

detect:
  enabled: true
  fps: 5

ffmpeg:
  global_args: [-hide_banner, -loglevel, info]
  hwaccel_args: preset-vaapi

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 5

record:
  enabled: true
  retain:
    days: 5
    mode: motion
    #  events:
    #    retain:
    #      default: 15
    #      mode: motion
    #      objects:
    #        person: 30

objects:
  track:
    - person
  filters:
    person:
      min_area: 5000
      max_area: 1000000
      threshold: 0.7

go2rtc:
  streams:
    cam-01:
      - rtsp://192.168.1.28/ch0_0.h264
    cam-01-sub:
      - rtsp://192.168.1.28/ch0_1.h264

cameras:
  cam-01:
    ffmpeg:
      inputs:
        - path: rtsp://localhost:8554/cam-01
          input_args: preset-rtsp-restream
          roles: [record]
        - path: rtsp://localhost:8554/cam-01-sub
          input_args: preset-rtsp-restream
          roles: [detect]
    detect:
      enabled: true
    objects:
      track:
        - person
        - car
        - dog
        - cat

    #    detect:
    #      width: 640
    #      height: 480
    #      fps: 7
    # objects:
    #   filters:
    #     person:
    #       mask:
    #         - 960,626,800,617,797,0,960,0
    #         - 960,0,960,138,0,149,0,0