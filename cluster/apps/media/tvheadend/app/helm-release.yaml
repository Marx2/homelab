---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tvheadend
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  values:
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    #        supplementalGroups:
    #          - 44
    #          - 212
    #          - 109

    controllers:
      tvheadend:
        containers:
          tvheadend:
            image:
              repository: registry.skysolutions.fi/library/tvheadend
              tag: 4.3.10584@sha256:895a07ebd89783a990c7e2b9f909b1e6ff1265b1c30e9602d8a771f54a77b8c9
            command: "/entrypoint.sh"
            args: ["--noacl"]
            env:
              TZ: "${TZ}"
            resources:
              requests:
                cpu: 100m
                memory: 20Mi
              limits:
                cpu: 1000m
                memory: 1096Mi
    #            securityContext:
    #              privileged: true
    # RUN_OPTS: "-d -l --debug -l --subsystems -l --trace -l --libav -l --uidebug"
          epg-updater:
            image:
              repository: alpine
              tag: 3.24
            command: ["/bin/sh", "-c"]
            args:
              - |
                apk add --no-cache socat wget && \
                until [ -S /config/epggrab/xmltv.sock ]; do echo "Waiting for EPG socket..."; sleep 10; done && \
                wget -q -O - http://epg.ovh/pl.xml | socat - UNIX-CONNECT:/config/epggrab/xmltv.sock && \
                echo '0 */6 * * * wget -q -O - http://epg.ovh/pl.xml | socat - UNIX-CONNECT:/config/epggrab/xmltv.sock' > /etc/crontabs/root && \
                crond -f -d 8
            securityContext:
              runAsUser: 0
              runAsGroup: 0

    service:
      tvheadend:
        controller: tvheadend
        type: LoadBalancer
        externalIPs:
          - 192.168.1.211
        ports:
          http:
            enabled: true
            port: 80
            targetPort: 9981
          htsp:
            enabled: true
            protocol: TCP
            port: 9982

    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          #          nginx.ingress.kubernetes.io/auth-url: "https://auth.${SECRET_DOMAIN}/oauth2/auth"
          #          nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
          #          nginx.ingress.kubernetes.io/proxy-body-size: 50m
          #          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
          hajimari.io/enable: "true"
          hajimari.io/appName: "TVHeadend"
          hajimari.io/icon: "mdi:television-play"
          hajimari.io/info: TV streaming server and recorder
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: tvheadend
                  port: http
        tls:
          - hosts:
              - *host

    persistence:
      config:
        enabled: true
        existingClaim: config-tvheadend-pvc
        globalMounts:
          - path: /config
      recordings-omv:
        enabled: true
        existingClaim: nfs-recordings-omv-pvc
        globalMounts:
          - path: /recordings
      timeshift:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /timeshift

