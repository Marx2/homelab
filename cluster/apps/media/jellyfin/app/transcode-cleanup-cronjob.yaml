# WORKAROUND: Jellyfin bug #17120 — live TV transcode segments not deleted
# despite "Delete segments" setting being enabled. Remove this CronJob once
# the bug is fixed in a future Jellyfin release.
# https://github.com/jellyfin/jellyfin/issues/17120
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jellyfin-transcode-cleanup
  namespace: media
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: busybox:1.36
              command:
                - sh
                - -c
                - find /cache/transcodes -type f -name "*.ts" -mmin +1440 -delete && find /cache/transcodes -type f -name "*.m3u8" -mmin +1440 -delete
              volumeMounts:
                - name: transcode
                  mountPath: /cache/transcodes
          volumes:
            - name: transcode
              nfs:
                server: 192.168.1.49
                path: /volume1/media/jellyfin-cache
