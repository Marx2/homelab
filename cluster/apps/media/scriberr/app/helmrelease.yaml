---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scriberr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:

    defaultPodOptions:
      securityContext:
        runAsUser: 1027
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      scriberr:
        type: deployment

        containers:
          app:
            image:
              repository: ghcr.io/rishikanthc/scriberr
              tag: v1.2.0

            env:
              TZ: ${TZ}
              PUID: 1027
              PGID: 100
              APP_ENV: production
              TRANSCRIPTS_DIR: /app/transcripts
              UPLOAD_DIR: /app/uploads
              UV_CACHE_DIR: /app/whisperx-env/.cache/uv
              UV_PYTHON_INSTALL_DIR: /app/whisperx-env/.cache/uv-python
              GIT_CONFIG_NOSYSTEM: "1"
              GIT_CONFIG_GLOBAL: /app/data/.gitconfig
              GIT_CONFIG_COUNT: "1"
              GIT_CONFIG_KEY_0: safe.directory
              GIT_CONFIG_VALUE_0: "*"
              HF_HOME: /app/whisperx-env/.cache/huggingface
              XDG_CACHE_HOME: /app/whisperx-env/.cache
              NLTK_DATA: /app/whisperx-env/.cache/nltk_data

            resources:
              requests:
                cpu: 0.003
                memory: 249Mi
              limits:
                memory: 7Gi

            probes:
              startup:
                spec:
                  initialDelaySeconds: 60
                  failureThreshold: 160

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080

    ingress:
      app:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/auth-url: "https://auth.${SECRET_DOMAIN}/oauth2/auth"
          nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
          hajimari.io/enable: "true"
          hajimari.io/icon: "disc-player"
          hajimari.io/group: "media"
        hosts:
          - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

        tls:
          - hosts:
              - *host

    persistence:
      data:
        existingClaim: scriberr-config-pvc
        globalMounts:
          - path: /app/data
      whisperx:
        type: nfs
        server: 192.168.1.49
        path: /volume1/kubernetes/whisperx
        globalMounts:
          - path: /app/whisperx-env
      pinchflat:
        existingClaim: nfs-media-pinchflat-pvc
        globalMounts:
          - path: /app/pinchflat
            readOnly: true
      transcripts:
        type: nfs
        server: 192.168.1.49
        path: /volume1/media/transcripts
        globalMounts:
          - path: /app/transcripts
      uploads:
        type: emptyDir
        globalMounts:
          - path: /app/uploads
